<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Diner Chatbot</title>
    <style>
        /* アメリカンダイナー風デザイン */
        body {
            background-color: #222;
            background-image: radial-gradient(#444 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #chat-container {
            width: 400px;
            background-color: #f3e5ab; /* クリーム色 */
            border: 8px solid #d32f2f; /* ダイナーレッド */
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(211, 47, 47, 0.5), 10px 10px 0px #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ヘッダーのネオン風装飾 */
        header {
            background-color: #d32f2f;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 4px double #fff;
            text-shadow: 2px 2px #000;
        }

        /* チャット履歴エリア */
        #chat-log {
            height: 300px;
            padding: 15px;
            overflow-y: auto;
            background: 
                linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%, #eee 100%),
                linear-gradient(45deg, #eee 25%, white 25%, white 75%, #eee 75%, #eee 100%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px; /* チェッカーフラッグ柄 */
        }

        .message {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 5px;
            max-width: 80%;
            font-weight: bold;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.2);
        }

        .user-msg {
            background-color: #00897b; /* ティールカラー */
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }

        .bot-msg {
            background-color: white;
            color: #d32f2f;
            border: 2px solid #d32f2f;
            align-self: flex-start;
        }

        /* 入力エリア */
        .input-area {
            display: flex;
            padding: 10px;
            background-color: #d32f2f;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px 0 0 5px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            background-color: #ffeb3b; /* イエロー */
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 0 5px 5px 0;
            transition: 0.2s;
        }

        button:hover {
            background-color: #fbc02d;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div id="chat-container">
    <header>★ DIER CHAT BOT ★</header>
    <div id="chat-log" style="display: flex; flex-direction: column;">
        <div class="message bot-msg">いらっしゃい！何が知りたいんだい？</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="キーワードを入力..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">SEND</button>
    </div>
</div>

<script>
    function sendMessage() {
        const inputField = document.getElementById('user-input');
        const chatLog = document.getElementById('chat-log');
        const keyword = inputField.value.trim();

        if (keyword === "") return;

        // 1. ユーザーのメッセージを表示
        addMessage(keyword, 'user-msg');

        // 2. ボットの返答ロジック
        let response = "";
        if (keyword.includes("送料")) {
            response = "全国一律500円です。リーズナブルだろ？";
        } else if (keyword.includes("時間")) {
            response = "営業時間は 9:00〜18:00 だ。遅れないでくれよ！";
        } else {
            response = "OK、担当者にお繋ぎします。ちょっと待ってな。";
        }

        // 3. ボットのメッセージを表示（少し遅らせてリアリティを出す）
        setTimeout(() => {
            addMessage(response, 'bot-msg');
        }, 500);

        inputField.value = ""; // 入力欄をクリア
    }

    function addMessage(text, className) {
        const chatLog = document.getElementById('chat-log');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message ' + className;
        msgDiv.textContent = text;
        chatLog.appendChild(msgDiv);
        
        // 常に最新のメッセージが見えるようにスクロール
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    // Enterキーでも送信できるようにする
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }
</script>

</body>
</html>
