<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ULTIMATE PORTAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Roboto:wght@900&display=swap');

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
        }

        .container {
            text-align: center;
            border: 10px solid #ff0000;
            padding: 50px;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 50px #ff0000, inset 0 0 20px #ff0000;
            transform: skew(-2deg);
        }

        h1 {
            font-family: 'Bungee', cursive;
            font-size: 4rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 5px 5px 0px #0051ff, 10px 10px 0px #ff0000;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 20px 0;
        }

        a {
            display: inline-block;
            text-decoration: none;
            color: #fff;
            font-size: 2rem;
            font-weight: bold;
            padding: 15px 40px;
            border: 4px solid #fff;
            transition: all 0.3s ease;
            position: relative;
            background: #000;
            width: 300px;
            text-transform: uppercase;
        }

        /* ホバーアクション：アメリカン・ハイテンション */
        a:hover {
            background: #fff;
            color: #000;
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 0 30px #fff;
        }

        .emoji {
            margin-right: 15px;
        }

        /* 背景の装飾的な星（アメリカ国旗イメージ） */
        .star {
            position: absolute;
            color: rgba(255, 255, 255, 0.1);
            font-size: 2rem;
            z-index: -1;
        }
    </style>
</head>
<body>

    <!-- 装飾用の星（雰囲気出し） -->
    <div class="star" style="top: 10%; left: 10%;">★</div>
    <div class="star" style="top: 20%; right: 15%;">★</div>
    <div class="star" style="bottom: 15%; left: 20%;">★</div>
    <div class="star" style="bottom: 10%; right: 10%;">★</div>

    <div class="container">
        <h1>Welcome To My World!</h1>
        
        <ul>
            <li>
                <a href="aisatu.html"><span class="emoji">🤝</span>GREETING</a>
            </li>
            <li>
                <a href="menu.html"><span class="emoji">🍔</span>SPECIAL MENU</a>
            </li>
            <li>
                <a href="bot.html"><span class="emoji">🤖</span>AI BOT CORE</a>
            </li>
        </ul>

        <p style="margin-top: 30px; color: #aaa; font-style: italic;">EST. 2024 - KEEP IT REAL</p>
    </div>

</body>
</html>
