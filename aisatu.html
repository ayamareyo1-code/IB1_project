<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ポップな挨拶ボタン</title>
    <style>
        /* 全体のレイアウト */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f8ff; /* 明るい水色 */
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
        }

        /* 箱のスタイル */
        #message-box {
            width: 300px;
            height: 200px;
            background-color: #ffffff;
            border: 5px solid #333;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
            box-shadow: 10px 10px 0px #ffd700; /* ポップな影 */
            transition: all 0.3s ease; /* 変化をスムーズに */
        }

        /* ボタンのスタイル */
        button {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #ff6b6b; /* ポップな赤ピンク */
            border: 3px solid #333;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #b33939;
            outline: none;
        }

        /* ボタンを押した時の動き */
        button:active {
            box-shadow: none;
            transform: translateY(5px);
        }

        /* 変化後のスタイル用クラス */
        .activated {
            background-color: #ffff00 !important; /* 背景を黄色に */
            transform: scale(1.05); /* 少し大きく */
            border-color: #ff4500 !important;
        }
    </style>
</head>
<body>

    <!-- 箱 -->
    <div id="message-box">
        準備中...
    </div>

    <!-- ボタン -->
    <button onclick="changeContent()">ここを押してね！</button>

    <script>
        function changeContent() {
            // IDを使って要素を取得
            const box = document.getElementById('message-box');
            
            // 文字を変更
            box.innerText = "いらっしゃいませ！";
            
            // CSSクラスを追加して背景色などを変更
            box.classList.add('activated');
        }
    </script>

</body>
</html>
